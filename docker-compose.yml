services:
  dashboard-tb-recife:
    build: .
    container_name: dashboard-tb-recife
    restart: unless-stopped
    ports:
      - "8503:8501"
    volumes:
      - ./dados_dashboard:/app/dados_dashboard:ro
    environment:
      - STREAMLIT_SERVER_BASE_URL_PATH=cenarios/tbrecife
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/tbrecife/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
